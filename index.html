<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>餐饮菜单二维码生成器</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- 头部 -->
  <header class="app-header">
    <h1>🍽️ 餐饮菜单二维码生成器</h1>
    <p>输入菜单信息 → 预览效果 → 生成二维码，扫码即可查看电子菜单</p>
  </header>

  <!-- 步骤指示器 -->
  <nav class="steps-bar">
    <div class="step-item active" data-step="1">
      <div class="step-dot">1</div>
      <div class="step-label">输入信息</div>
    </div>
    <div class="step-item" data-step="2">
      <div class="step-dot">2</div>
      <div class="step-label">预览菜单</div>
    </div>
    <div class="step-item" data-step="3">
      <div class="step-dot">3</div>
      <div class="step-label">生成导出</div>
    </div>
  </nav>

  <main class="app-main">

    <!-- ===== 步骤 1：输入信息 ===== -->
    <section class="step-panel active" data-step="1">
      <div class="panel">
        <h2 class="panel-title"><span class="icon">🏪</span> 餐厅信息</h2>
        <div class="form-group">
          <label for="restaurantName">餐厅名称</label>
          <input type="text" id="restaurantName" class="form-input" placeholder="例如：小橙食堂" maxlength="30">
        </div>
      </div>

      <div class="panel">
        <h2 class="panel-title"><span class="icon">📋</span> 快速加载预设菜单</h2>
        <div class="preset-buttons">
          <button class="btn btn-sm btn-outline" data-preset="minimal">简约风示例</button>
          <button class="btn btn-sm btn-outline" data-preset="ins">ins风示例</button>
          <button class="btn btn-sm btn-outline" data-preset="vintage">复古风示例</button>
        </div>
      </div>

      <div class="panel">
        <h2 class="panel-title"><span class="icon">🍜</span> 菜品列表</h2>
        <div id="dishList" class="dish-list"></div>
        <button type="button" id="btnAddDish" class="btn btn-secondary btn-sm">+ 添加菜品</button>
      </div>

      <div class="panel">
        <h2 class="panel-title"><span class="icon">🎨</span> 菜单模板</h2>
        <div class="template-grid">
          <div class="template-card selected" data-template="minimal">
            <div class="tpl-icon">◻️</div>
            <div class="tpl-name">简约风</div>
            <div class="tpl-desc">干净留白，经典排版</div>
          </div>
          <div class="template-card" data-template="ins">
            <div class="tpl-icon">✨</div>
            <div class="tpl-name">ins风</div>
            <div class="tpl-desc">渐变卡片，年轻时尚</div>
          </div>
          <div class="template-card" data-template="vintage">
            <div class="tpl-icon">📜</div>
            <div class="tpl-name">复古风</div>
            <div class="tpl-desc">怀旧色调，经典韵味</div>
          </div>
        </div>
      </div>

      <div class="btn-group">
        <button type="button" id="btnNext1" class="btn btn-primary">下一步：预览菜单 →</button>
      </div>
    </section>

    <!-- ===== 步骤 2：预览 ===== -->
    <section class="step-panel" data-step="2">
      <div class="panel">
        <h2 class="panel-title"><span class="icon">👀</span> 菜单预览</h2>
        <div class="menu-preview-wrap">
          <div id="menuPreview" class="menu-preview"></div>
        </div>
      </div>

      <div class="panel">
        <h2 class="panel-title"><span class="icon">📝</span> 复制菜单文本</h2>
        <p style="font-size:0.85rem;color:#6c757d;margin-bottom:12px;">
          一键复制纯文本菜单，方便通过微信等渠道发给顾客
        </p>
        <button type="button" id="btnCopyText" class="btn btn-outline">📋 复制菜单文本</button>
      </div>

      <div class="btn-group">
        <button type="button" id="btnPrev2" class="btn btn-secondary">← 上一步</button>
        <button type="button" id="btnNext2" class="btn btn-primary">下一步：生成二维码 →</button>
      </div>
    </section>

    <!-- ===== 步骤 3：生成/导出 ===== -->
    <section class="step-panel" data-step="3">
      <div class="panel">
        <h2 class="panel-title"><span class="icon">📱</span> 菜单二维码</h2>
        <div class="qr-section">
          <!-- 左侧：自定义选项 -->
          <div class="qr-options">
            <div class="form-group">
              <label>二维码颜色</label>
              <div class="color-row">
                <span style="font-size:0.85rem;">前景色</span>
                <input type="color" id="colorDark" value="#e55a2b">
              </div>
              <div class="color-row">
                <span style="font-size:0.85rem;">背景色</span>
                <input type="color" id="colorLight" value="#ffffff">
              </div>
            </div>
            <div class="form-group">
              <label for="logoInput">Logo 水印（可选）</label>
              <input type="file" id="logoInput" accept="image/*" class="form-input">
              <img id="logoPreview" class="logo-preview" alt="Logo预览">
            </div>
            <button type="button" id="btnRegenerate" class="btn btn-secondary btn-sm">🔄 重新生成</button>
          </div>

          <!-- 右侧：二维码展示 -->
          <div class="qr-display">
            <div class="qr-canvas-wrap">
              <canvas id="qrCanvas" width="280" height="280"></canvas>
              <div id="qrLoading" class="qr-loading">
                <div class="spinner"></div>
                <span style="font-size:0.85rem;color:#666;">正在生成二维码…</span>
              </div>
            </div>
            <p class="qr-tip">扫码即可打开电子菜单页面</p>
          </div>
        </div>

        <div class="btn-group" style="margin-top:20px;">
          <button type="button" id="btnExportHD" class="btn btn-primary">⬇️ 导出高清 PNG（1024px，可打印）</button>
        </div>
      </div>

      <!-- 桌号批量生成 -->
      <div class="panel">
        <h2 class="panel-title"><span class="icon">🪑</span> 批量生成桌号二维码</h2>
        <p style="font-size:0.85rem;color:#6c757d;margin-bottom:12px;">
          为每张桌子生成独立二维码，扫码后菜单页会显示对应桌号
        </p>
        <div class="table-batch">
          <div class="form-row">
            <div class="form-group">
              <label for="tableStart">起始桌号</label>
              <input type="number" id="tableStart" class="form-input" value="1" min="1">
            </div>
            <div class="form-group">
              <label for="tableEnd">结束桌号</label>
              <input type="number" id="tableEnd" class="form-input" value="5" min="1">
            </div>
          </div>
          <div class="form-group">
            <label for="tablePrefix">桌号后缀</label>
            <input type="text" id="tablePrefix" class="form-input" value="号桌" placeholder="例如：号桌">
          </div>
          <button type="button" id="btnGenTables" class="btn btn-primary btn-sm">生成桌号二维码</button>
        </div>
        <div id="tableQrGrid" class="table-qr-grid"></div>
      </div>

      <div class="btn-group">
        <button type="button" id="btnPrev3" class="btn btn-secondary">← 上一步</button>
      </div>
    </section>

  </main>

  <!-- Toast 提示 -->
  <div id="toast" class="toast"></div>

  <!-- 隐藏的 QR 生成容器（qrcode.js 需要） -->
  <div id="qrHidden"></div>

  <!-- 依赖：qrcode.js（本地） + 公共工具 + 主逻辑 -->
  <script src="js/qrcode.min.js"></script>
  <script src="js/common.js"></script>
  <script src="js/generator.js"></script>
</body>
</html>
